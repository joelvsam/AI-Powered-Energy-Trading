name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # CPU-only torch first so pip does not pull the multi-GB CUDA build.
      - name: Install CPU torch
        run: pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m compileall -q src scripts dashboard tests

      - name: Run tests
        run: python -m pytest tests -q
